<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Florida Regional Operating Summary</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { display: flex; flex-direction: column; height: 100vh; background: #0A0A0A; font-family: Arial, Helvetica, sans-serif; }

  /* Slim chrome bar ABOVE the frame — never overlaps the content */
  #bar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
    height: 44px; padding: 0 12px; background: #141416; border-bottom: 1px solid #2A2A2D;
  }
  #back {
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
    background: #E21224; color: #FFFFFF; font-weight: 700; font-size: 13px;
    padding: 7px 14px 7px 10px; border-radius: 999px; white-space: nowrap;
  }
  #back:hover { background: #C10F1F; }
  #back svg { display: block; }
  #title {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: #E6E6E6; font-size: 13px; font-weight: 700; letter-spacing: .01em;
  }
  #open {
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none; white-space: nowrap;
    color: #9F9FA3; font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 999px; border: 1px solid #3A3A3E;
  }
  #open:hover { color: #FFFFFF; border-color: #6A6A6E; }
  #open svg { display: block; }

  #frame { flex: 1; width: 100%; border: 0; background: #0A0A0A; min-height: 0; }

  /* Launch card with a large live preview (for sites that block embedding) */
  #err { flex: 1; display: none; align-items: center; justify-content: center; padding: 28px; overflow: auto; }
  #err.show { display: flex; }
  #err .card { width: 100%; max-width: 640px; text-align: center; color: #E6E6E6; }
  .preview {
    display: block; width: 100%; aspect-ratio: 16 / 10; border-radius: 12px; overflow: hidden;
    border: 1px solid #2A2A2D; background: #141416 center/cover no-repeat; position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,.5); text-decoration: none;
  }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview .ph {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #6E6E72; font-size: 13px; letter-spacing: .04em;
  }
  .preview .badge {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    background: rgba(10,10,10,.78); color: #FFD9DD; border: 1px solid #E21224;
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 999px;
  }
  .preview .hovergo {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,10,.45); opacity: 0; transition: opacity 140ms ease; z-index: 2;
    color: #FFFFFF; font-weight: 700; font-size: 15px;
  }
  .preview:hover .hovergo { opacity: 1; }
  #err h1 { margin: 18px 0 6px; font-family: Georgia, serif; font-size: 22px; color: #FFFFFF; }
  #err p { margin: 0 0 18px; font-size: 13.5px; line-height: 1.5; color: #9F9FA3; }
  #err a.go {
    display: inline-flex; align-items: center; gap: 8px; background: #E21224; color: #FFFFFF;
    text-decoration: none; font-weight: 700; font-size: 14px; padding: 12px 22px; border-radius: 999px;
  }
  #err a.go:hover { background: #C10F1F; }
  #err a.go svg { display: block; }
</style>
</head>
<body>

<div id="bar">
  <a id="back" href="/" title="Return to the Florida Regional Operating Summary">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
    Back to Florida ROS
  </a>
  <span id="title"></span>
  <a id="open" href="#" target="_blank" rel="noopener noreferrer" title="Open this page in its own tab">
    Open full
    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"></path><path d="M20 4l-9 9"></path><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"></path></svg>
  </a>
</div>

<iframe id="frame"
  allow="fullscreen; geolocation; clipboard-read; clipboard-write"
  allowfullscreen
  referrerpolicy="no-referrer-when-downgrade"></iframe>

<div id="err">
  <div class="card">
    <a class="preview" id="previewLink" href="#" target="_blank" rel="noopener noreferrer">
      <span class="badge">Opens in a new tab</span>
      <img id="preview" alt="" referrerpolicy="no-referrer">
      <span class="ph" id="previewPh">Loading preview…</span>
      <span class="hovergo">Open ↗</span>
    </a>
    <h1 id="errTitle">This site opens in its own tab</h1>
    <p id="errNote">This page can't be displayed inside the summary, so it opens in a new tab. Use “Back to Florida ROS” to return.</p>
    <a class="go" id="errlink" href="#" target="_blank" rel="noopener noreferrer">
      Open the page
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"></path><path d="M20 4l-9 9"></path><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"></path></svg>
    </a>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var raw = params.get("u") || params.get("url") || "";
  var title = params.get("t") || params.get("title") || "";
  var frame = document.getElementById("frame");
  var open = document.getElementById("open");
  var err = document.getElementById("err");
  var errlink = document.getElementById("errlink");
  var titleEl = document.getElementById("title");

  if (title) { document.title = title + " — Florida ROS"; titleEl.textContent = title; }

  function allowedHost(h) {
    h = (h || "").toLowerCase();
    // Hosts that send X-Frame-Options/deny — never frame (would be blank). They
    // fall through to the preview launch card instead.
    var blocked = ["app.powerbi.com", "orglerws.redcross.org", "apps.usgs.gov"];
    if (blocked.indexOf(h) !== -1) return false;
    // Any Power BI host sends X-Frame-Options/deny — never frame (would be blank).
    if (h.indexOf("powerbi") !== -1 || h.indexOf("orgler") !== -1) return false;
    var ok = ["arcgis.com","arcg.is","jbf.com","noaa.gov","weather.gov",
              "usgs.gov","nwcg.gov","unl.edu","baynews9.com","redcross.org"];
    for (var i = 0; i < ok.length; i++) {
      if (h === ok[i] || h.endsWith("." + ok[i])) return true;
    }
    return false;
  }

  var dest = null;
  try { dest = new URL(raw); } catch (e) { dest = null; }

  function showCard(href) {
    var safe = href && /^https?:/.test(href) ? href : "/";
    document.getElementById("errlink").href = safe;
    document.getElementById("previewLink").href = safe;
    open.href = safe;
    if (title) document.getElementById("errTitle").textContent = title;

    // Pre-generated static thumbnails (captured ahead of time, committed in repo —
    // no runtime screenshot service). Keyed by destination host. To add one:
    // capture assets/previews/<slug>.png and map the host here.
    var PREVIEWS = {
      "apps.usgs.gov": "/assets/previews/usgs-fim.png"
    };
    var host = "";
    try { host = new URL(safe).hostname.toLowerCase(); } catch (e) {}
    var img = document.getElementById("preview");
    var ph = document.getElementById("previewPh");
    var local = PREVIEWS[host];
    if (local) {
      img.onload = function () { ph.style.display = "none"; };
      img.onerror = function () { ph.textContent = "Preview unavailable"; };
      img.src = local;
    } else {
      ph.textContent = "";  // no preview on file — show plain panel
    }
    err.classList.add("show");
    frame.style.display = "none";
  }

  if (!dest || (dest.protocol !== "https:" && dest.protocol !== "http:") || !allowedHost(dest.hostname)) {
    showCard(dest && (dest.protocol === "https:" || dest.protocol === "http:") ? dest.href : "");
    return;
  }
  open.href = dest.href;
  errlink.href = dest.href;
  frame.src = dest.href;
})();
</script>

</body>
</html>
