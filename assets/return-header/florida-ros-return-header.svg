<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="96" viewBox="0 0 1800 96" role="img" aria-labelledby="title desc">
  <title id="title">Florida ROS return header</title>
  <desc id="desc">Black header bar with a red Back to Florida ROS button and Operating Picture title.</desc>
  <rect width="1800" height="96" fill="#141416"/>
  <rect y="95" width="1800" height="1" fill="#2A2A2D"/>
  <g transform="translate(20 18)">
    <rect width="380" height="60" rx="30" fill="#E21224"/>
    <path d="M62 30l14-14M62 30l14 14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="102" y="39" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">Back to Florida ROS</text>
  </g>
  <text x="430" y="58" fill="#E6E6E6" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Operating Picture</text>
</svg>
